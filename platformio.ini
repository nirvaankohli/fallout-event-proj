[platformio]
src_dir = code

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 460800

[env:laptop_xiao_esp32c3]
board = seeed_xiao_esp32c3
build_src_filter =
  +<laptop-xiao-esp32c3/**>
  -<onboard-xiao-esp32c3/**>

[env:onboard_xiao_esp32c3]
board = seeed_xiao_esp32c3
build_src_filter =
  +<onboard-xiao-esp32c3/**>
  -<laptop-xiao-esp32c3/**>
